<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engle Estimator vWeb 2.6</title>

<script src="pricebook1.js"></script>
<script src="pricebook2.js"></script>
<script src="pricebook3.js"></script>
<script src="pricebook4.js"></script>
<script src="pricebook5.js"></script>
<script src="pricebook6.js"></script>
<script src="pricebook7.js"></script>
<script src="pricebook8.js"></script>
<script src="pricebook9.js"></script>
<script src="pricebook10.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,system-ui;
  background:#eef1f4;
}

/* HEADER */
header{
  background:#111;
  color:white;
  padding:12px;
  border-bottom:4px solid #c3141b;
}

/* MAIN LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
  height:calc(100vh - 70px);
}

/* PANELS */
.panel{
  background:white;
  border-radius:14px;
  padding:12px;
  overflow:auto;
}

/* ITEMS */
.item{
  border:1px solid #ddd;
  border-radius:12px;
  padding:10px;
  margin-bottom:8px;
  background:#fff;
}

.item-title{
  font-weight:800;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#c3141b;
  color:white;
  font-weight:700;
}

/* TOTALS */
.totals{
  border-top:2px solid #ddd;
  margin-top:10px;
  padding-top:10px;
}

.total{
  display:flex;
  justify-content:space-between;
}

.final{
  font-size:22px;
  font-weight:900;
  color:#c3141b;
}

/* NOTE */
.note{
  background:#fff3a0;
  padding:6px;
  border-radius:6px;
  font-weight:800;
  margin-top:6px;
}
</style>
</head>

<body>

<header>
  Engle Estimator vWeb 2.6
</header>

<div class="container">

<!-- LEFT SIDE -->
<div class="panel">

<input id="search" placeholder="Search..." style="width:100%;padding:10px;margin-bottom:10px">

<div id="results"></div>

</div>

<!-- RIGHT SIDE -->
<div class="panel">

<div id="estimate"></div>

<div class="totals">
  <div class="total"><span>Subtotal</span><span id="subtotal">$0</span></div>
  <div class="total" id="discountRow"><span>Discount</span><span id="discountVal">$0</span></div>
  <div class="total" id="taxRow"><span>Tax</span><span id="taxVal">$0</span></div>
  <div class="final total"><span>Total</span><span id="total">$0</span></div>
</div>

</div>

</div>

<script>

const items = window.ENGLE_PRICE_BOOK || [];

let estimate = [];
let taxOn = false;
let discountOn = false;

function renderResults(){
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = items.filter(i =>
    i.name.toLowerCase().includes(q)
  ).slice(0,50);

  document.getElementById("results").innerHTML =
    filtered.map(i => `
      <div class="item">
        <div class="item-title">${i.name}</div>
        <div>$${i.retail}</div>
        <button onclick="addItem('${i.name}')">Add</button>
      </div>
    `).join("");
}

function addItem(name){
  const item = items.find(i=>i.name===name);
  estimate.push({...item,qty:1});
  renderEstimate();
}

function renderEstimate(){
  let subtotal = 0;

  document.getElementById("estimate").innerHTML =
    estimate.map(i=>{
      const total = i.qty * i.retail;
      subtotal += total;

      return `
        <div class="item">
          <div class="item-title">${i.name}</div>
          <div>$${total}</div>
        </div>
      `;
    }).join("");

  let discount = discountOn ? 50 : 0;
  let tax = taxOn ? subtotal * .07 : 0;

  document.getElementById("subtotal").innerText = "$"+subtotal;
  document.getElementById("discountVal").innerText = "-$"+discount;
  document.getElementById("taxVal").innerText = "$"+tax;

  document.getElementById("total").innerText = "$"+(subtotal - discount + tax);
}

document.getElementById("search").addEventListener("input", renderResults);

renderResults();

</script>

</body>
</html>
