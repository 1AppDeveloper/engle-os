<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engle OS vWeb 2.3.7</title>

<style>
body{font-family:sans-serif;margin:0;background:#eef1f4}
.card{background:#fff;padding:12px;border-radius:12px;margin:10px}
.primary{background:#c3141b;color:#fff;border:none;padding:10px;border-radius:8px}
.secondary{background:#ddd;border:none;padding:10px;border-radius:8px}
.hidden{display:none}
.modalwrap{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.modalwrap.show{display:flex}
.modal{background:#fff;padding:20px;border-radius:12px;width:300px}
.hivis{animation:flash 1s 2}
@keyframes flash{50%{background:#d8ff4d}}
</style>
</head>

<body>

<div id="login" class="card">
<h3>Login</h3>
<input id="pw" placeholder="Password">
<button onclick="login()">Enter</button>
</div>

<div id="app" class="hidden">

<div class="card">
<label>Customer Name</label>
<input id="jobName">
</div>

<div class="card">
<label>Sales Rep / Estimator</label>
<input id="salesRep">
</div>

<div class="card">
<label>Job Address</label>
<input id="jobAddress">
</div>

<div class="card">
<label>Billing Address</label>
<input id="billingAddress">
<label><input type="checkbox" id="billingSame"> Same as Job</label>
</div>

<div class="card">
<label><input type="checkbox" id="taxOn"> Tax</label>
<input id="taxRate" readonly>

<label><input type="checkbox" id="travelOn"> Travel</label>
<input id="travelTier" readonly>

<label><input type="checkbox" id="discountOn"> Discount</label>
<input id="discount">
</div>

<div class="card">
<div>Subtotal: <span id="sub">$0</span></div>
<div id="taxRow" class="hidden">Tax: <span id="tax">$0</span></div>
<div id="travelRow" class="hidden">Travel: <span id="travel">$0</span></div>
<div>Total: <span id="total">$0</span></div>
</div>

</div>

<!-- TAX MODAL -->
<div class="modalwrap" id="taxModal">
<div class="modal">
<h3>Tax</h3>
<select id="taxSelect"></select>
<button onclick="applyTax()">Apply</button>
</div>
</div>

<!-- TRAVEL MODAL -->
<div class="modalwrap" id="travelModal">
<div class="modal">
<h3>Travel</h3>
<select id="travelSelect"></select>
<button onclick="applyTravel()">Apply</button>
</div>
</div>

<script>

const PASSWORD="Deerpoop";

function login(){
if(document.getElementById("pw").value===PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("app").classList.remove("hidden");
}else alert("Wrong password");
}

const travelTiers=[
["0-15",0],
["16-30",50],
["31-50",100]
];

const taxRates=[];
for(let i=2.5;i<=20;i+=.5) taxRates.push(i);

const tSel=document.getElementById("taxSelect");
taxRates.forEach(t=>{
let o=document.createElement("option");
o.value=t;o.text=t+"%";tSel.appendChild(o);
});

const trSel=document.getElementById("travelSelect");
travelTiers.forEach((t,i)=>{
let o=document.createElement("option");
o.value=i;o.text=t[0]+" $"+t[1];trSel.appendChild(o);
});

document.getElementById("taxOn").onchange=e=>{
if(e.target.checked){
document.getElementById("taxModal").classList.add("show");
}else{
document.getElementById("taxRow").classList.add("hidden");
}
};

document.getElementById("travelOn").onchange=e=>{
if(e.target.checked){
document.getElementById("travelModal").classList.add("show");
}else{
document.getElementById("travelRow").classList.add("hidden");
}
};

function applyTax(){
let val=tSel.value;
document.getElementById("taxRate").value=val;
document.getElementById("taxModal").classList.remove("show");
document.getElementById("taxRow").classList.remove("hidden");
updateTotals();
}

function applyTravel(){
let val=trSel.value;
document.getElementById("travelTier").value=val;
document.getElementById("travelModal").classList.remove("show");
document.getElementById("travelRow").classList.remove("hidden");
updateTotals();
}

function updateTotals(){
let base=500;
let tax=document.getElementById("taxOn").checked ? base*(tSel.value/100) : 0;
let travel=document.getElementById("travelOn").checked ? travelTiers[trSel.value][1] : 0;

document.getElementById("sub").innerText="$"+base;
document.getElementById("tax").innerText="$"+tax.toFixed(2);
document.getElementById("travel").innerText="$"+travel;
document.getElementById("total").innerText="$"+(base+tax+travel);
}

</script>

</body>
</html>
