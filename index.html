<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engle OS vWeb2</title>
<style>
body{font-family:sans-serif;margin:0;background:#eef1f4}
header{background:black;color:white;padding:15px;border-bottom:4px solid red}
.container{display:flex;flex-wrap:wrap}
.left,.right{flex:1;padding:10px}
.item{background:white;padding:10px;margin-top:10px;border-radius:10px}
button{padding:10px;background:red;color:white;border:none;border-radius:8px}
</style>
</head>
<body>

<div id="login">
<h2>Login</h2>
<input type="password" id="pw" placeholder="Password">
<button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none">
<header>
<h2>Engle OS Estimator</h2>
</header>

<div class="container">
<div class="left">
<h3>Add Items</h3>
<input id="search" placeholder="Search...">
<div id="results"></div>
</div>

<div class="right">
<h3>Estimate</h3>
<div id="estimate"></div>
</div>
</div>
</div>

<script>
const password="Deerpoop";

const items=[
{name:"Paint Walls",price:3.25},
{name:"Replace Sink",price:625},
{name:"Install Faucet",price:325},
{name:"Cabinet Knob",price:18}
];

let estimate=[];

function login(){
if(document.getElementById("pw").value===password){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
}else{alert("Wrong password")}
}

document.getElementById("search").addEventListener("input",function(){
let q=this.value.toLowerCase();
let results=items.filter(i=>i.name.toLowerCase().includes(q));
document.getElementById("results").innerHTML=results.map(i=>
`<div class="item">
${i.name} - $${i.price}
<br><button onclick="addItem('${i.name}',${i.price})">Add</button>
</div>`).join("");
});

function addItem(name,price){
estimate.push({name,price});
render();
}

function render(){
document.getElementById("estimate").innerHTML=estimate.map(i=>
`<div class="item">${i.name} - $${i.price}</div>`
).join("");
}
</script>

</body>
</html>
