<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estimator</title>
<script src="pricebook.js"></script>
<style>
body { font-family: Arial; margin:20px; }
input, select { width:100%; padding:10px; margin-bottom:10px; }
button { padding:10px; background:red; color:white; border:none; }
.item { border:1px solid #ccc; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<h2>Estimator</h2>

<input id="name" placeholder="Customer Name">
<input id="search" placeholder="Search items...">

<div id="results"></div>

<h3>Estimate</h3>
<div id="estimate"></div>

<h2 id="total">$0</h2>

<script>

let estimate = [];

document.getElementById("search").addEventListener("input", function(){
  let q = this.value.toLowerCase();

  let results = window.ENGLE_PRICE_BOOK.filter(i =>
    i.name.toLowerCase().includes(q)
  );

  document.getElementById("results").innerHTML = results.map(i => `
    <div class="item">
      <b>${i.name}</b><br>
      ${i.unit} - $${i.retail}
      <br><br>
      <button onclick="addItem('${i.name}')">Add</button>
    </div>
  `).join("");
});

function addItem(name){
  let item = window.ENGLE_PRICE_BOOK.find(i => i.name === name);

  let qty = prompt("Enter quantity:");
  qty = Number(qty);

  let total = item.retail * qty;

  estimate.push({name, qty, total});

  render();
}

function render(){
  document.getElementById("estimate").innerHTML = estimate.map(i => `
    <div>${i.name} - ${i.qty} = $${i.total}</div>
  `).join("");

  let total = estimate.reduce((s,i)=>s+i.total,0);

  document.getElementById("total").innerText = "$" + total;
}

</script>

</body>
</html>
