<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engle OS vWeb 2.6</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:#fff;padding:10px}
.container{display:flex;height:90vh}
.left,.right{flex:1;overflow:auto;padding:10px}
input,select{width:100%;padding:8px;margin:5px 0}
button{padding:6px;margin:3px;border:none;border-radius:4px;background:#ddd}
button.active{background:#c00;color:#fff}
.item{background:#fff;margin:5px;padding:8px;border-radius:5px}
.flash{animation:flash 1s 3}
@keyframes flash{0%{background:#d8ffb0}50%{background:#fff}100%{background:#d8ffb0}}
.highlight{background:#fff3cd;padding:4px;margin-top:3px;font-size:14px}
</style>
</head>

<body>

<header>Engle Construction / iRoofOhio Estimator</header>

<div class="container">

<div class="left">

<input id="customer" placeholder="Customer / Job Name">
<input id="sales" placeholder="Sales Rep / Estimator">
<input id="address" placeholder="Job Address">

<select id="area">
<option>Whole House</option>
<option>Master Bedroom</option>
<option>Bedroom 1</option>
<option>Bedroom 2</option>
<option>Kitchen</option>
<option>Living Room</option>
<option>Bathroom</option>
</select>

<input id="search" placeholder="Search line items...">

<div id="bubbles"></div>
<div id="results"></div>

</div>

<div class="right">

<h3>Estimate</h3>
<div id="estimate"></div>

<hr>

<label><input type="checkbox" id="taxCheck"> Tax</label>
<input id="tax" placeholder="Tax %" disabled>

<label><input type="checkbox" id="travelCheck"> Travel</label>
<input id="travel" placeholder="Travel $" disabled>

<label><input type="checkbox" id="discountCheck"> Discount</label>
<input id="discount" placeholder="Discount $" disabled>

<h2 id="total">$0</h2>

</div>

</div>

<script>

// 🔥 FULL PRICE BOOK (sample expanded — structure ready for full injection)
const PRICE_BOOK = [
{cat:"Painting",name:"Paint Walls (2 Coat)",unit:"SF",price:2.85},
{cat:"Painting",name:"Paint Walls, Ceilings, Trim, Doors",unit:"SF",price:3.75},
{cat:"Flooring",name:"Install LVP Flooring",unit:"SF",price:4.5},
{cat:"Flooring",name:"Carpet Replacement",unit:"SF",price:3.25},
{cat:"Plumbing",name:"Toilet Replacement",unit:"EA",price:350},
{cat:"Plumbing",name:"Toilet Install Only",unit:"EA",price:225},
{cat:"Electrical",name:"Light Fixture Replacement",unit:"EA",price:150},
{cat:"Carpentry",name:"Baseboard Install",unit:"LF",price:8.5},
{cat:"Roofing",name:"Roof Replacement (Shingle)",unit:"SQ",price:450}
];

// STATE
let estimate=[]
let activeCategory=null

// BUILD BUBBLES
const bubbleDiv=document.getElementById("bubbles")
const categories=[...new Set(PRICE_BOOK.map(i=>i.cat))]

categories.forEach(cat=>{
let btn=document.createElement("button")
btn.innerText=cat

btn.onclick=()=>{
document.querySelectorAll("#bubbles button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

activeCategory=cat
document.getElementById("search").value=""
renderResults(PRICE_BOOK.filter(i=>i.cat===cat))
}

bubbleDiv.appendChild(btn)
})

// SEARCH
document.getElementById("search").oninput=e=>{
activeCategory=null
document.querySelectorAll("#bubbles button").forEach(b=>b.classList.remove("active"))

let val=e.target.value.toLowerCase()
let filtered=PRICE_BOOK.filter(i=>i.name.toLowerCase().includes(val))

renderResults(filtered)
}

// RESULTS
function renderResults(list){
const el=document.getElementById("results")
el.innerHTML=""

list.forEach(item=>{
let div=document.createElement("div")
div.className="item"
div.innerHTML=`${item.name} - $${item.price}/${item.unit}`

div.onclick=()=>{
let qty=prompt("Enter quantity:")
if(!qty)return

let note=prompt("Optional note:")

estimate.push({
...item,
qty:parseFloat(qty),
area:document.getElementById("area").value,
note:note
})

renderEstimate()

// CLEAR RESULTS AFTER ADD
document.getElementById("results").innerHTML=""
document.getElementById("search").value=""
activeCategory=null
document.querySelectorAll("#bubbles button").forEach(b=>b.classList.remove("active"))
}

el.appendChild(div)
})
}

// ESTIMATE RENDER
function renderEstimate(){
const el=document.getElementById("estimate")
el.innerHTML=""

let total=0

// GROUP BY AREA
let grouped={}

estimate.forEach(i=>{
if(!grouped[i.area]) grouped[i.area]=[]
grouped[i.area].push(i)
})

Object.keys(grouped).sort().forEach(area=>{
el.innerHTML+=`<h4>${area}</h4>`

grouped[area].forEach(i=>{
let line=i.qty*i.price
total+=line

el.innerHTML+=`
<div>
${i.name} (${i.qty}) = $${line.toFixed(2)}
${i.note?`<div class="highlight">${i.note}</div>`:""}
</div>
`
})
})

// TAX
if(taxCheck.checked){
let tax=total*(parseFloat(tax.value||0)/100)
total+=tax
}

// TRAVEL
if(travelCheck.checked){
total+=parseFloat(travel.value||0)
}

// DISCOUNT
if(discountCheck.checked){
total-=parseFloat(discount.value||0)
}

// MINIMUM JOB
if(total<450) total=450

document.getElementById("total").innerText="$"+total.toFixed(2)
}

// CHECKBOX LOGIC
function toggleBox(check,input){
input.disabled=!check.checked
if(!check.checked){
input.value=""
renderEstimate()
}
}

taxCheck.onchange=()=>toggleBox(taxCheck,tax)
travelCheck.onchange=()=>toggleBox(travelCheck,travel)
discountCheck.onchange=()=>toggleBox(discountCheck,discount)

tax.oninput=renderEstimate
travel.oninput=renderEstimate
discount.oninput=renderEstimate

</script>

</body>
</html>
